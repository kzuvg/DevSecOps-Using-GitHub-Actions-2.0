name: Dependency Scan

on:
  workflow_call:


jobs:

  dependency-scan:
    runs-on: ubuntu-22.04

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install pip audit
        run: pip install pip-audit

      - name: Dependency Audit
        run: pip-audit -r requiremts.txt
        
